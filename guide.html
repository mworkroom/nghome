<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#00b5ef" />
    <meta
      name="description"
      content="NANGOK 사용 안내 — 줌 화면 공유와 교육자료 만들기"
    />
    <title>사용 안내 | NANGOK</title>

    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png">
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.css"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <div class="page-shell">
      <div class="ambient ambient--top" aria-hidden="true"></div>
      <div class="ambient ambient--bottom" aria-hidden="true"></div>

      <header class="site-header">
        <a class="brand" href="./index.html" aria-label="NANGOK 홈으로 돌아가기">
          <span class="brand-mark" aria-hidden="true">
            <span></span><span></span><span></span>
          </span>
          <span class="brand-text">
            <strong>NANGOK</strong>
            <small>WORKSPACE</small>
          </span>
        </a>

        <div class="tool-count" aria-label="사용 안내">
          <span class="tool-count__dot"></span>
          사용 안내
        </div>
      </header>

      <main>
        <section class="hero" aria-labelledby="page-title">
          <p class="eyebrow">WORK GUIDE</p>
          <h1 id="page-title">어떤 업무에 도움이 필요하신가요?</h1>
          <p class="hero-description">필요한 안내를 누르면 그림으로 확인할 수 있습니다.</p>
        </section>

        <section class="app-grid" aria-label="사용 안내 목록">
          <button
            class="app-card"
            style="--accent: #4d7ea8; --accent-soft: #eaf2f8"
            type="button"
            data-open-zoom-dialog
            aria-haspopup="dialog"
          >
            <span class="app-card__icon" aria-hidden="true">
              <svg viewBox="0 0 48 48" role="img">
                <rect x="7" y="12" width="25" height="24" rx="5"></rect>
                <path d="m32 20 9-5v18l-9-5Z"></path>
                <path d="M14 21h11"></path>
                <path d="m21 17 4 4-4 4"></path>
              </svg>
            </span>
            <span class="app-card__content">
              <span class="app-card__category">화면 보여주기</span>
              <strong>줌 화면 공유</strong>
              <span class="app-card__description">교육자료를 줌에서 보여주는 방법</span>
            </span>
            <span class="app-card__arrow" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="m9 5 7 7-7 7"></path></svg>
            </span>
          </button>

          <article
            class="app-card"
            style="--accent: #527d88; --accent-soft: #eaf2f4"
            aria-label="교육자료 만들기 안내 준비 중"
          >
            <span class="app-card__icon" aria-hidden="true">
              <svg viewBox="0 0 48 48" role="img">
                <rect x="8" y="7" width="32" height="34" rx="4"></rect>
                <path d="M15 16h18"></path>
                <path d="M15 23h18"></path>
                <path d="M15 30h10"></path>
                <path d="M31 34v8"></path>
                <path d="M27 38h8"></path>
              </svg>
            </span>
            <span class="app-card__content">
              <span class="app-card__category">자료 준비</span>
              <strong>교육자료 만들기</strong>
              <span class="app-card__description">ChatGPT로 교육자료를 만드는 방법</span>
            </span>
            <span class="price-role__status">준비 중</span>
          </article>
        </section>
      </main>

      <dialog class="price-dialog" id="zoom-dialog" aria-labelledby="zoom-dialog-title">
        <div class="price-dialog__panel">
          <button class="price-dialog__close" type="button" data-close-zoom-dialog aria-label="닫기">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6 6 18"></path></svg>
          </button>

          <div class="price-dialog__header">
            <span class="price-dialog__eyebrow">줌 화면 공유</span>
            <h2 id="zoom-dialog-title">어떤 자료를 보여주실 건가요?</h2>
          </div>

          <div class="price-role-list">
            <div class="price-role" aria-disabled="true">
              <span class="price-role__text">
                <strong>새로 만든 교육자료</strong>
                <small>ChatGPT에서 만든 그림 자료를 보여줄 때</small>
              </span>
              <span class="price-role__status">준비 중</span>
            </div>

            <div class="price-role" aria-disabled="true">
              <span class="price-role__text">
                <strong>받은 파워포인트</strong>
                <small>다른 사람이 보낸 슬라이드 자료를 보여줄 때</small>
              </span>
              <span class="price-role__status">준비 중</span>
            </div>
          </div>
        </div>
      </dialog>

      <footer class="site-footer">
        <span class="footer-line"></span>
        <p>nangok.app</p>
      </footer>
    </div>

    <script>
      const zoomDialog = document.getElementById("zoom-dialog");
      const openZoomDialogButton = document.querySelector("[data-open-zoom-dialog]");
      const closeZoomDialogButton = document.querySelector("[data-close-zoom-dialog]");

      openZoomDialogButton.addEventListener("click", () => zoomDialog.showModal());
      closeZoomDialogButton.addEventListener("click", () => zoomDialog.close());

      zoomDialog.addEventListener("click", (event) => {
        if (event.target === zoomDialog) zoomDialog.close();
      });
    </script>
  </body>
</html>
