  </head>

  <body class="guide-page guide-page--ai">
    <div class="page">
      <header>
        <a class="brand" href="../index.html" aria-label="NANGOK 홈으로 돌아가기">
          <span class="brand-mark" aria-hidden="true">
            <span></span><span></span><span></span>
          </span>
          <span class="brand-text">
            <strong>NANGOK</strong>
            <small>WORKSPACE</small>
          </span>
        </a>

        <a class="back-link" href="../guide.html">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 5-7 7 7 7"></path></svg>
          이전 화면으로 돌아가기
        </a>
      </header>

      <main>
        <p class="eyebrow">CHATGPT GUIDE</p>
        <h1>ChatGPT로 교육자료<br />그림 만들기</h1>
        <p class="description">아래 그림을 보고 따라 해주세요.</p>

        <div class="guide-list">
          <section class="guide-step" aria-labelledby="prompt-one-title">
            <figure>
              <img
                src="../assets/guides/ai_guide_01.png"
                alt="ChatGPT로 교육자료 그림을 만들기 위한 첫 번째 안내"
                loading="eager"
              />
            </figure>

            <div class="prompt-card">
              <div class="prompt-head">
                <div>
                  <span class="prompt-label">첫 번째 복붙 내용</span>
                  <h2 id="prompt-one-title">파일 이름을 고친 뒤 복사하세요</h2>
                </div>
                <button class="copy-button" type="button" data-copy="prompt-one">전체 복사</button>
              </div>
              <p class="prompt-help">대괄호로 표시된 교육자료 파일명과 제품사진 파일명을 실제 이름으로 바꾸면 됩니다.</p>
              <textarea id="prompt-one" spellcheck="false">
먼저 프로젝트의 `01_ATOMY_MASTER_RULES.md` 전체를 읽어 주세요.

첨부된 
[교육자료의 정확한 파일명].pdf
파일을 공식 내용과 수치의 근거로 사용해 주세요.

함께 첨부한
[제품사진].png 
파일은 변경해서는 안 되는 공식 제품 자산입니다. 


제품 패키지를 새로 디자인하거나 비슷한 제품으로 다시 그리지 말고, 
첨부한 제품 사진 속 상자와 용기를 그대로 분리하여 사용해 주세요.

한국 회원들을 위한 발표 이미지 시리즈의 기획안만 작성해 주세요.
아직 이미지는 생성하지 마세요.

먼저 독립적인 교육 메시지와 정보 밀도를 분석한 뒤 필요한 이미지 수를 결정해 주세요.


각 이미지에 대해 다음 내용을 보여주세요.

- 이미지 목적
- 핵심 메시지
- 화면에 표시할 문구
- 주요 시각 구조
- 사용할 공식 자료
- 제품 사진 사용 방식
- 정보 밀도 판정
- 분리 필요 여부</textarea>
              <p class="copy-status" id="prompt-one-status" aria-live="polite"></p>
            </div>
          </section>

          <section class="guide-step" aria-labelledby="prompt-two-title">
            <figure>
              <img
                src="../assets/guides/ai_guide_02.png"
                alt="ChatGPT로 교육자료 그림을 만들기 위한 두 번째 안내"
                loading="lazy"
              />
            </figure>

            <div class="prompt-card">
              <div class="prompt-head">
                <div>
                  <span class="prompt-label">두 번째 복붙 내용</span>
                  <h2 id="prompt-two-title">제품사진 이름을 확인한 뒤 복사하세요</h2>
                </div>
                <button class="copy-button" type="button" data-copy="prompt-two">전체 복사</button>
              </div>
              <p class="prompt-help">다음 그림부터는 이미지 번호만 2번, 3번처럼 바꾸어 같은 내용을 다시 사용하면 됩니다.</p>
              <textarea class="prompt-short" id="prompt-two" spellcheck="false">
구상안대로 1번 이미지를 만들어줘.

[제품사진].png 
제품 패키지는 첨부한 이미지 제품을 그대로 사용하고 새로 디자인하지 마.</textarea>
              <p class="copy-status" id="prompt-two-status" aria-live="polite"></p>
            </div>
          </section>

          <section class="guide-step">
            <figure>
              <img
                src="../assets/guides/ai_guide_03.png"
                alt="ChatGPT로 교육자료 그림을 만드는 마지막 안내"
                loading="lazy"
              />
            </figure>

          </section>
        </div>

        <div class="bottom-actions">
          <a class="back-link" href="../guide.html">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 5-7 7 7 7"></path></svg>
            이전 화면으로 돌아가기
          </a>
        </div>
      </main>
    </div>

    <script>
      const copyButtons = document.querySelectorAll("[data-copy]");

      async function copyPrompt(button) {
        const textarea = document.getElementById(button.dataset.copy);
        const status = document.getElementById(`${button.dataset.copy}-status`);
        const originalLabel = button.textContent;

        try {
          await navigator.clipboard.writeText(textarea.value);
        } catch (error) {
          textarea.focus();
          textarea.select();
          document.execCommand("copy");
          textarea.setSelectionRange(0, 0);
        }

        button.textContent = "복사 완료";
        status.textContent = "복사했습니다. ChatGPT 입력창에 붙여넣으세요.";

        window.setTimeout(() => {
          button.textContent = originalLabel;
          status.textContent = "";
        }, 2500);
      }

      copyButtons.forEach((button) => {
        button.addEventListener("click", () => copyPrompt(button));
      });
    </script>
  </body>
</html>
